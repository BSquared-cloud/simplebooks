{% extends "base.html" %}
{% block title %}{{ "Edit" if entry else "Add" }} Entry — SimpleBooks{% endblock %}

{% block content %}
<h1>{{ "Edit" if entry else "Add" }} Entry</h1>

<form method="post">
    <label>
        Date
        <input type="date" name="date" value="{{ entry.date.strftime('%Y-%m-%d') if entry else '' }}" required>
    </label>

    <label>
        Description
        <input type="text" name="description" value="{{ entry.description if entry else '' }}"
               placeholder="e.g., Uber fare from downtown" maxlength="300" required>
    </label>

    <div class="grid">
        <label>
            Amount ($)
            <input type="number" name="amount" step="0.01" min="0.01"
                   value="{{ '%.2f'|format(entry.amount_dollars) if entry else '' }}"
                   placeholder="0.00" required>
        </label>

        <fieldset>
            <legend>Type</legend>
            <label>
                <input type="radio" name="entry_type" value="credit"
                       {{ "checked" if not entry or entry.entry_type == "credit" }}>
                Credit (money in)
            </label>
            <label>
                <input type="radio" name="entry_type" value="debit"
                       {{ "checked" if entry and entry.entry_type == "debit" }}>
                Debit (money out)
            </label>
        </fieldset>
    </div>

    <label>
        Category
        <select name="category_id" required>
            <option value="">Select a category...</option>
            <!-- Group categories by type for easier selection -->
            <optgroup label="Income">
                {% for cat in categories if cat.type == "income" %}
                    <option value="{{ cat.id }}" {{ "selected" if entry and entry.category_id == cat.id }}>
                        {{ cat.name }}
                    </option>
                {% endfor %}
            </optgroup>
            <optgroup label="Expense">
                {% for cat in categories if cat.type == "expense" %}
                    <option value="{{ cat.id }}" {{ "selected" if entry and entry.category_id == cat.id }}>
                        {{ cat.name }}
                    </option>
                {% endfor %}
            </optgroup>
        </select>
    </label>

    <button type="submit">{{ "Update" if entry else "Add" }} Entry</button>
    <a href="{{ url_for('entries.index') }}" role="button" class="secondary outline">Cancel</a>
</form>
{% endblock %}
